name: goreleaser

on:
  push:
    # run only against tags
    tags:
      - '*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Clone matching management center fork
        run: |
          set -euo pipefail
          repo="https://github.com/mortyandtimo/Cli-Proxy-API-Management-Center.git"
          ref="${GITHUB_REF_NAME}"
          clone_ref=""

          if git ls-remote --exit-code --heads "${repo}" "${ref}" >/dev/null 2>&1 || \
             git ls-remote --exit-code --tags "${repo}" "${ref}" >/dev/null 2>&1; then
            clone_ref="${ref}"
            echo "Using frontend ref ${clone_ref}"
          else
            echo "Frontend ref ${ref} not found, falling back to default branch"
          fi

          if [ -n "${clone_ref}" ]; then
            git clone --depth 1 --branch "${clone_ref}" "${repo}" cpamc
          else
            git clone --depth 1 "${repo}" cpamc
          fi
          git -C cpamc rev-parse --short HEAD

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cpamc/package-lock.json

      - name: Build bundled management UI
        run: |
          set -euo pipefail
          cd cpamc
          npm ci
          npm run build
          install -m 0644 dist/index.html ../internal/managementasset/management.html
          ls -lh ../internal/managementasset/management.html
        env:
          VERSION: ${{ github.ref_name }}

      - run: git fetch --force --tags
      - uses: actions/setup-go@v4
        with:
          go-version: '>=1.26.0'
          cache: true
      - name: Generate Build Metadata
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo COMMIT=`git rev-parse --short HEAD` >> $GITHUB_ENV
          echo BUILD_DATE=`date -u +%Y-%m-%dT%H:%M:%SZ` >> $GITHUB_ENV
      - uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.VERSION }}
          COMMIT: ${{ env.COMMIT }}
          BUILD_DATE: ${{ env.BUILD_DATE }}
